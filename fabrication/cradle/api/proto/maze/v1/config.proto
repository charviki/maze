syntax = "proto3";

package maze.v1;

option go_package = "github.com/charviki/maze-cradle/api/gen/maze/v1";

import "google/api/annotations.proto";

message GetConfigRequest {
  string node_name = 1;
}

message UpdateConfigRequest {
  string node_name = 1;
  string working_dir = 2;
  map<string, string> env = 3;
}

// 与 protocol.LocalAgentConfig 对齐
message LocalAgentConfig {
  string working_dir = 1;
  map<string, string> env = 2;
}

service ConfigService {
  rpc GetConfig(GetConfigRequest) returns (LocalAgentConfig) {
    option (google.api.http) = {
      get: "/api/v1/nodes/{node_name}/local-config"
    };
  }
  rpc UpdateConfig(UpdateConfigRequest) returns (LocalAgentConfig) {
    option (google.api.http) = {
      put: "/api/v1/nodes/{node_name}/local-config"
      body: "*"
    };
  }
}
