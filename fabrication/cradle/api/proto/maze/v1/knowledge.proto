syntax = "proto3";

package maze.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/charviki/maze/fabrication/cradle/api/gen/maze/v1";

message Attachment {
  string id = 1;
  string key = 2;
  string name = 3;
  string content_type = 4;
  int64 size = 5;
}

message Archive {
  string id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  string author = 5;
  string created_at = 6;
  string updated_at = 7;
}

message Doc {
  string id = 1;
  string archive_id = 2;
  string parent_id = 3;
  string title = 4;
  string content = 5;
  string summary = 6;
  string status = 7;
  string priority = 8;
  string assignee = 9;
  repeated string tags = 10;
  string author = 11;
  string visibility = 12;
  repeated string shared_with = 13;
  repeated Attachment attachments = 14;
  string created_at = 15;
  string updated_at = 16;
}

message DocTreeNode {
  Doc doc = 1;
  repeated DocTreeNode children = 2;
}

message DocLink {
  string id = 1;
  string source_id = 2;
  string target_id = 3;
  string relation_type = 4;
  string source_title = 5;
  string target_title = 6;
  string created_at = 7;
}

message CreateArchiveRequest {
  string name = 1 [(buf.validate.field).string = { min_len: 1 }];
  string description = 2;
  string icon = 3;
}
message GetArchiveRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}
message ListArchivesRequest {}
message ListArchivesResponse {
  repeated Archive archives = 1;
}
message UpdateArchiveRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string name = 2;
  string description = 3;
  string icon = 4;
}
message DeleteArchiveRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}

message CreateDocRequest {
  string archive_id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string parent_id = 2;
  string title = 3 [(buf.validate.field).string = { min_len: 1 }];
  string content = 4;
  string summary = 5;
  string status = 6;
  string priority = 7;
  string assignee = 8;
  repeated string tags = 9;
  string visibility = 10;
  repeated string shared_with = 11;
  repeated Attachment attachments = 12;
}

message GetDocRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}
message ListDocsRequest {
  string archive_id = 1;
  string parent_id = 2;
  string status = 3;
  string visibility = 4;
  string author = 5;
  int32 limit = 6;
  int32 offset = 7;
}
message ListDocsResponse {
  repeated Doc items = 1;
  int32 total = 2;
}

message UpdateDocRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string title = 2;
  string content = 3;
  string summary = 4;
  string status = 5;
  string priority = 6;
  string assignee = 7;
  repeated string tags = 8;
  string visibility = 9;
  repeated string shared_with = 10;
  repeated Attachment attachments = 11;
  string parent_id = 12;
}

message DeleteDocRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}
message SearchDocsRequest {
  string q = 1 [(buf.validate.field).string = { min_len: 1 }];
  string archive_id = 2;
  string visibility = 3;
  string author = 4;
}
message SearchDocsResponse {
  repeated Doc items = 1;
}
message GetDocTreeRequest {
  string archive_id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string parent_id = 2;
}
message GetDocTreeResponse {
  repeated DocTreeNode nodes = 1;
}
message GetDocAncestorsRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}
message GetDocAncestorsResponse {
  repeated Doc ancestors = 1;
}

message GetLinksRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string direction = 2;
  string relation_type = 3;
}
message GetLinksResponse {
  repeated DocLink links = 1;
}
message CreateLinkRequest {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string target_id = 2 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  string relation_type = 3 [(buf.validate.field).string = { min_len: 1 }];
}
message DeleteLinkRequest {
  string id = 1;
  string link_id = 2 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}

service KnowledgeService {
  rpc CreateArchive(CreateArchiveRequest) returns (Archive) {
    option (google.api.http) = {
      post: "/api/v1/archives"
      body: "*"
    };
  }
  rpc GetArchive(GetArchiveRequest) returns (Archive) {
    option (google.api.http) = {get: "/api/v1/archives/{id}"};
  }
  rpc ListArchives(ListArchivesRequest) returns (ListArchivesResponse) {
    option (google.api.http) = {get: "/api/v1/archives"};
  }
  rpc UpdateArchive(UpdateArchiveRequest) returns (Archive) {
    option (google.api.http) = {
      put: "/api/v1/archives/{id}"
      body: "*"
    };
  }
  rpc DeleteArchive(DeleteArchiveRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/archives/{id}"};
  }

  rpc CreateDoc(CreateDocRequest) returns (Doc) {
    option (google.api.http) = {
      post: "/api/v1/docs"
      body: "*"
    };
  }
  rpc GetDoc(GetDocRequest) returns (Doc) {
    option (google.api.http) = {get: "/api/v1/docs/{id}"};
  }
  rpc ListDocs(ListDocsRequest) returns (ListDocsResponse) {
    option (google.api.http) = {get: "/api/v1/docs"};
  }
  rpc UpdateDoc(UpdateDocRequest) returns (Doc) {
    option (google.api.http) = {
      put: "/api/v1/docs/{id}"
      body: "*"
    };
  }
  rpc DeleteDoc(DeleteDocRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/docs/{id}"};
  }
  rpc SearchDocs(SearchDocsRequest) returns (SearchDocsResponse) {
    option (google.api.http) = {get: "/api/v1/docs:search"};
  }
  rpc GetDocTree(GetDocTreeRequest) returns (GetDocTreeResponse) {
    option (google.api.http) = {get: "/api/v1/docs:tree"};
  }
  rpc GetDocAncestors(GetDocAncestorsRequest) returns (GetDocAncestorsResponse) {
    option (google.api.http) = {get: "/api/v1/docs/{id}/ancestors"};
  }

  rpc GetLinks(GetLinksRequest) returns (GetLinksResponse) {
    option (google.api.http) = {get: "/api/v1/docs/{id}/links"};
  }
  rpc CreateLink(CreateLinkRequest) returns (DocLink) {
    option (google.api.http) = {
      post: "/api/v1/docs/{id}/links"
      body: "*"
    };
  }
  rpc DeleteLink(DeleteLinkRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/docs/{id}/links/{link_id}"};
  }
}
