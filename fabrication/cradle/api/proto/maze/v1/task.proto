syntax = "proto3";

package maze.v1;

option go_package = "github.com/charviki/maze/fabrication/cradle/api/gen/maze/v1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

message Directive {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string priority = 5;
  string assignee = 6;
  string author = 7;
  repeated string require_doc_ids = 8;
  string narrative_id = 9;
  string archive_id = 10;
  string visibility = 11;
  string created_at = 12;
  string updated_at = 13;
}

message CreateDirectiveRequest {
  string title = 1;
  string description = 2;
  string status = 3;
  string priority = 4;
  string assignee = 5;
  repeated string require_doc_ids = 6;
  string narrative_id = 7;
  string archive_id = 8;
  string visibility = 9;
}

message GetDirectiveRequest {
  string id = 1;
}

message UpdateDirectiveRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string priority = 5;
  string assignee = 6;
  string author = 7;
  repeated string require_doc_ids = 8;
  string narrative_id = 9;
  string archive_id = 10;
  string visibility = 11;
}

message DeleteDirectiveRequest {
  string id = 1;
}

message ListDirectivesRequest {
  string status = 1;
  string assignee = 2;
  string priority = 3;
  string visibility = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message ListDirectivesResponse {
  repeated Directive items = 1;
  int32 total = 2;
}

service DirectiveService {
  rpc CreateDirective(CreateDirectiveRequest) returns (Directive) {
    option (google.api.http) = {
      post: "/api/v1/directives"
      body: "*"
    };
  }

  rpc GetDirective(GetDirectiveRequest) returns (Directive) {
    option (google.api.http) = {
      get: "/api/v1/directives/{id}"
    };
  }

  rpc ListDirectives(ListDirectivesRequest) returns (ListDirectivesResponse) {
    option (google.api.http) = {
      get: "/api/v1/directives"
    };
  }

  rpc UpdateDirective(UpdateDirectiveRequest) returns (Directive) {
    option (google.api.http) = {
      put: "/api/v1/directives/{id}"
      body: "*"
    };
  }

  rpc DeleteDirective(DeleteDirectiveRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/directives/{id}"
    };
  }
}
