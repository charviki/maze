syntax = "proto3";
package maze.v1;
option go_package = "github.com/charviki/maze/fabrication/cradle/api/gen/maze/v1";

// ErrorReason 是附加在 google.rpc.ErrorInfo.reason 中的稳定、机器可读错误原因。
// 前后端按此枚举分流逻辑，不解析 message 字符串。
enum ErrorReason {
  ERROR_REASON_UNSPECIFIED = 0;

  // Authentication (→ Unauthenticated)
  ERROR_REASON_TOKEN_MISSING = 1;
  ERROR_REASON_TOKEN_INVALID = 2;
  ERROR_REASON_TOKEN_EXPIRED = 3;
  ERROR_REASON_INVALID_CREDENTIALS = 4;
  ERROR_REASON_USER_DISABLED = 5;
  ERROR_REASON_REFRESH_TOKEN_NOT_FOUND = 6;
  ERROR_REASON_REFRESH_TOKEN_REVOKED = 7;
  ERROR_REASON_REFRESH_TOKEN_EXPIRED = 8;

  // Not Found (→ NotFound)
  ERROR_REASON_ARCHIVE_NOT_FOUND = 10;
  ERROR_REASON_DOC_NOT_FOUND = 11;
  ERROR_REASON_LINK_NOT_FOUND = 12;
  ERROR_REASON_RESOURCE_NOT_FOUND = 13;
  ERROR_REASON_PERMISSION_APPLICATION_NOT_FOUND = 14;
  ERROR_REASON_PERMISSION_GRANT_NOT_FOUND = 15;
  ERROR_REASON_SESSION_NOT_FOUND = 16;

  // Already Exists (→ AlreadyExists)
  ERROR_REASON_ALREADY_EXISTS = 20;
  ERROR_REASON_DUPLICATE_SESSION = 21;

  // Validation (→ InvalidArgument)
  ERROR_REASON_VALIDATION_FAILED = 30;
  ERROR_REASON_INVALID_INPUT = 31;

  // Precondition (→ FailedPrecondition)
  ERROR_REASON_PRECONDITION_FAILED = 40;
  ERROR_REASON_PERMISSION_APPLICATION_STATE_CHANGED = 41;
  ERROR_REASON_WORKSPACE_ROOT_PROTECTED = 42;
  ERROR_REASON_CONFIG_CONFLICT = 43;
}
