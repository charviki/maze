syntax = "proto3";

package maze.v1;

option go_package = "github.com/charviki/maze-cradle/api/gen/maze/v1";

import "google/api/annotations.proto";

// 与 protocol.AuditLogEntry 对齐
message AuditLogEntry {
  string id = 1;
  string timestamp = 2;
  string operator = 3;
  string target_node = 4;
  string action = 5;
  string payload_summary = 6;
  string result = 7;
  int32 status_code = 8;
}

message GetAuditLogsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message GetAuditLogsResponse {
  repeated AuditLogEntry logs = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

service AuditService {
  rpc GetAuditLogs(GetAuditLogsRequest) returns (GetAuditLogsResponse) {
    option (google.api.http) = {
      get: "/api/v1/audit/logs"
    };
  }
}
