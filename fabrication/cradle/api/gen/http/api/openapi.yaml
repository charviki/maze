    v1PermissionApplicationStatus:
      default: PERMISSION_APPLICATION_STATUS_UNSPECIFIED
      description: |-
        - PERMISSION_APPLICATION_STATUS_PENDING: PENDING 表示申请单已创建，尚未审批。
         - PERMISSION_APPLICATION_STATUS_APPROVED: APPROVED 表示申请已批准，并已生成对应 grant。
         - PERMISSION_APPLICATION_STATUS_DENIED: DENIED 表示申请已被拒绝，不会生成 grant。
         - PERMISSION_APPLICATION_STATUS_REVOKED: REVOKED 表示已批准申请对应的 grant 已被撤销。
         - PERMISSION_APPLICATION_STATUS_EXPIRED: EXPIRED 表示申请关联的 grant 已因 TTL 到期被回收。
      enum:
      - PERMISSION_APPLICATION_STATUS_UNSPECIFIED
      - PERMISSION_APPLICATION_STATUS_PENDING
      - PERMISSION_APPLICATION_STATUS_APPROVED
      - PERMISSION_APPLICATION_STATUS_DENIED
      - PERMISSION_APPLICATION_STATUS_REVOKED
      - PERMISSION_APPLICATION_STATUS_EXPIRED
      title: PermissionApplicationStatus 表示权限申请单的生命周期状态。
      type: string
