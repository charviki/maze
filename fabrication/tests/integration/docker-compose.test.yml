services:
  postgres:
    image: postgres:17-alpine
    container_name: maze-test-postgres
    environment:
      POSTGRES_DB: maze_auth
      POSTGRES_USER: maze
      POSTGRES_PASSWORD: maze
    volumes:
      - ./init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maze -d maze_auth']
      interval: 5s
      timeout: 5s
      retries: 12

  director-core:
    build:
      context: ../../..
      dockerfile: the-mesa/director-core/Dockerfile
    container_name: maze-test-director-core
    ports:
      - '${PORT_DIRECTOR_CORE:-9090}:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_DATA_DIR:-${HOME}/.maze-test}/docker:/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DIRECTOR_CORE_JWT_SECRET: test-jwt-secret
      DIRECTOR_CORE_JWT_DEFAULT_ADMIN_USERNAME: admin
      DIRECTOR_CORE_JWT_DEFAULT_ADMIN_PASSWORD: admin
      DIRECTOR_CORE_ALLOW_PRIVATE_NETWORKS: 'true'
      DIRECTOR_CORE_DOCKER_NETWORK: '${COMPOSE_PROJECT_NAME:-maze-test}_default'
      DIRECTOR_CORE_WORKSPACE_BASE_DIR: /data
      DIRECTOR_CORE_WORKSPACE_MOUNT_DIR: /data
      DIRECTOR_CORE_DOCKER_AGENT_BASE_IMAGE: maze-agent:latest
      DIRECTOR_CORE_DOCKER_AGENT_DATA_DIR: ${HOST_DATA_DIR:-${HOME}/.maze-test}/docker/agents
      DIRECTOR_CORE_DOCKER_AGENT_JWT_SECRET: test-jwt-secret
      DIRECTOR_CORE_AUTH_DATABASE_HOST: postgres
      DIRECTOR_CORE_AUTH_DATABASE_PORT: '5432'
      DIRECTOR_CORE_AUTH_DATABASE_NAME: maze_auth
      DIRECTOR_CORE_AUTH_DATABASE_USER: maze
      DIRECTOR_CORE_AUTH_DATABASE_PASSWORD: maze
      DIRECTOR_CORE_HOST_DATABASE_HOST: postgres
      DIRECTOR_CORE_HOST_DATABASE_PORT: '5432'
      DIRECTOR_CORE_HOST_DATABASE_NAME: maze_host
      DIRECTOR_CORE_HOST_DATABASE_USER: maze
      DIRECTOR_CORE_HOST_DATABASE_PASSWORD: maze
      DIRECTOR_CORE_AUTHZ_ENABLED: 'true'
      DIRECTOR_CORE_AUTHZ_ADMIN_SUBJECT_KEY: user:admin
      DIRECTOR_CORE_AUTHZ_ADMIN_DISPLAY_NAME: admin

  the-forge:
    build:
      context: ../../..
      dockerfile: the-mesa/the-forge/Dockerfile
    container_name: maze-test-the-forge
    ports:
      - '${PORT_THE_FORGE:-9091}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      THE_FORGE_SERVER_JWT_SECRET: test-jwt-secret
      THE_FORGE_SERVER_LISTEN_ADDR: ':8080'
      THE_FORGE_SERVER_GRPC_ADDR: ':9090'
      THE_FORGE_DATABASE_HOST: postgres
      THE_FORGE_DATABASE_PORT: '5432'
      THE_FORGE_DATABASE_NAME: maze_forge
      THE_FORGE_DATABASE_USER: maze
      THE_FORGE_DATABASE_PASSWORD: maze
