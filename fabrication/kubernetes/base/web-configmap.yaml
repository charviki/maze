apiVersion: v1
kind: ConfigMap
metadata:
  name: web-nginx-config
  namespace: maze-prod
data:
  default.conf.template: |
    server {
        listen 80;
        server_name _;

        absolute_redirect off;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://${DIRECTOR_CORE_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            set $conn_value "close";
            if ($http_upgrade != "") {
                set $conn_value "upgrade";
            }
            proxy_set_header Connection $conn_value;

            proxy_read_timeout ${WS_TIMEOUT};
            proxy_send_timeout ${WS_TIMEOUT};
        }

        location /health {
            proxy_pass http://${DIRECTOR_CORE_UPSTREAM};
            proxy_set_header Host $host;
        }

        # Director Console SPA
        location /director-console/ {
            alias /usr/share/nginx/html/director-console/;
            try_files $uri $uri/ /director-console/index.html;
        }

        # Arrival Gate 作为首页
        location /arrival-gate/ {
            alias /usr/share/nginx/html/arrival-gate/;
            try_files $uri $uri/ /arrival-gate/index.html;
        }

        # 根路径重定向到 Arrival Gate
        location = / {
            rewrite ^ /arrival-gate/ redirect;
        }
    }
  # 环境变量默认值
  DIRECTOR_CORE_UPSTREAM: 'director-core.maze-prod.svc.cluster.local:8080'
  WS_TIMEOUT: '3600s'
