apiVersion: v1
kind: ConfigMap
metadata:
  name: web-nginx-config
  namespace: maze
data:
  default.conf.template: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://${MANAGER_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            set $conn_value "close";
            if ($http_upgrade != "") {
                set $conn_value "upgrade";
            }
            proxy_set_header Connection $conn_value;

            proxy_read_timeout ${WS_TIMEOUT};
            proxy_send_timeout ${WS_TIMEOUT};
        }

        location /health {
            proxy_pass http://${MANAGER_UPSTREAM};
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
  # 环境变量默认值
  MANAGER_UPSTREAM: "agent-manager.maze.svc.cluster.local:8080"
  WS_TIMEOUT: "3600s"
