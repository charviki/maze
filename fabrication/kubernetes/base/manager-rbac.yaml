apiVersion: v1
kind: ServiceAccount
metadata:
  name: maze-manager
  namespace: maze
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maze-manager-role
  namespace: maze
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maze-manager-binding
  namespace: maze
subjects:
  - kind: ServiceAccount
    name: maze-manager
    namespace: maze
roleRef:
  kind: Role
  name: maze-manager-role
  apiGroup: rbac.authorization.k8s.io
