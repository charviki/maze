apiVersion: v1
kind: Secret
metadata:
  name: manager-secret
  namespace: maze-prod
type: Opaque
stringData:
  # 替换为实际的 auth token
  AUTH_TOKEN: ''
  # PostgreSQL 凭据。
  # production overlay 默认会部署仓库内的 postgresql，并由 manager / postgresql 共同复用这组账号密码。
  # 如后续改回外部数据库，也继续沿用这两个键注入凭据即可。
  DATABASE_USER: 'maze'
  DATABASE_PASSWORD: 'maze'
