apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-entrypoint
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e
    # Docker Desktop VirtioFS 的 fsync 语义弱于原生 Linux，
    # VM 挂起/重启时 WAL checkpoint 可能被截断导致无法启动。
    # 在启动前检测并自动修复损坏的 WAL。
    if [ -f "$PGDATA/PG_VERSION" ] && ! pg_isready -q 2>/dev/null; then
      echo "[entrypoint] Attempting WAL recovery..."
      if ! pg_ctl start -w -t 30 -o "-c listen_addresses='' -p 5433" 2>/dev/null; then
        echo "[entrypoint] WAL recovery failed, resetting WAL with pg_resetwal..."
        gosu postgres pg_resetwal -f "$PGDATA" 2>&1 || true
      else
        pg_ctl stop -m fast -w -t 30 2>/dev/null || true
      fi
    fi
    exec /usr/local/bin/docker-entrypoint.sh postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: postgresql
          image: postgres:17-alpine
          command: ['/bin/sh', '/scripts/entrypoint.sh']
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: maze_auth
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: director-core-secret
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: director-core-secret
                  key: DATABASE_PASSWORD
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sync
                    pg_ctl stop -D "$PGDATA" -m fast
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: data
          hostPath:
            path: ${MAZE_HOST_PATH}/postgresql/data
            type: DirectoryOrCreate
        - name: init-db
          configMap:
            name: postgres-init-db
            defaultMode: 0755
        - name: scripts
          configMap:
            name: postgres-entrypoint
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
