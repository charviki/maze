apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-entrypoint
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e

    # Auto-recover corrupted WAL (Docker Desktop VirtioFS heavy I/O can corrupt checkpoint records).
    # If PG fails to start due to WAL corruption, pg_resetwal rebuilds the WAL from the data pages.
    if [ -d "$PGDATA" ] && [ -f "$PGDATA/PG_VERSION" ]; then
      if ! pg_controldata "$PGDATA" >/dev/null 2>&1; then
        echo "[entrypoint] pg_controldata failed, running pg_resetwal -f to recover"
        pg_resetwal -f "$PGDATA" 2>&1 || true
      fi
    fi

    exec /usr/local/bin/docker-entrypoint.sh postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-db
data:
  init-db.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      SELECT 'CREATE DATABASE maze_host' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'maze_host')\gexec
      SELECT 'CREATE DATABASE maze_forge' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'maze_forge')\gexec
    EOSQL
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: postgresql
          image: postgres:17-alpine
          command: ['/bin/sh', '/scripts/entrypoint.sh']
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: maze_auth
            - name: POSTGRES_INITDB_ARGS
              value: '--data-checksums'
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: director-core-secret
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: director-core-secret
                  key: DATABASE_PASSWORD
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sync
                    pg_ctl stop -D "$PGDATA" -m fast
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-data
        - name: init-db
          configMap:
            name: postgres-init-db
            defaultMode: 0755
        - name: scripts
          configMap:
            name: postgres-entrypoint
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
