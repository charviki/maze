apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: maze-test

resources:
  - ../../base
  - director-core-configmap.yaml
  - director-core-deployment.yaml
  - postgres.yaml

patches:
  - target:
      kind: Namespace
      name: maze-prod
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: maze-prod
  - target:
      kind: Deployment
      name: web
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
  - target:
      kind: Service
      name: web
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: web
  - target:
      kind: ConfigMap
      name: web-nginx-config
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: web-nginx-config
  - target:
      kind: Ingress
      name: web
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: web
  - target:
      kind: PersistentVolumeClaim
      name: director-core-data
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: director-core-data
  - target:
      kind: Secret
      name: director-core-secret
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: director-core-secret
      stringData:
        DIRECTOR_CORE_JWT_SECRET: 'test-jwt-secret'
        DIRECTOR_CORE_JWT_DEFAULT_ADMIN_USERNAME: 'admin'
        DIRECTOR_CORE_JWT_DEFAULT_ADMIN_PASSWORD: 'admin'
        DIRECTOR_CORE_KUBERNETES_AGENT_JWT_SECRET: 'test-jwt-secret'
        DATABASE_USER: 'maze'
        DATABASE_PASSWORD: 'maze'
