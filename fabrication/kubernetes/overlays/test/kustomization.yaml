apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: maze-test

resources:
  - ../../base
  - manager-configmap.yaml
  - manager-deployment.yaml
  - postgres.yaml

patches:
  - target:
      kind: Namespace
      name: maze-prod
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: maze-prod
  - target:
      kind: Deployment
      name: web
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
  - target:
      kind: Service
      name: web
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: web
  - target:
      kind: ConfigMap
      name: web-nginx-config
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: web-nginx-config
  - target:
      kind: Ingress
      name: web
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: web
  - target:
      kind: PersistentVolumeClaim
      name: manager-data
    patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: manager-data
