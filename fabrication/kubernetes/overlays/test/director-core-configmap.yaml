apiVersion: v1
kind: ConfigMap
metadata:
  name: director-core-config
data:
  DIRECTOR_CORE_RUNTIME_TYPE: 'kubernetes'
  DIRECTOR_CORE_KUBERNETES_NAMESPACE: 'maze-test'
  DIRECTOR_CORE_KUBERNETES_AGENT_IMAGE_PREFIX: 'maze-agent'
  DIRECTOR_CORE_KUBERNETES_AGENT_IMAGE_TAG: 'latest'
  DIRECTOR_CORE_KUBERNETES_IMAGE_PULL_POLICY: 'Never'
  DIRECTOR_CORE_KUBERNETES_DIRECTOR_CORE_ADDR: 'director-core.maze-test.svc.cluster.local:8080'
  DIRECTOR_CORE_KUBERNETES_PVC_SIZE: '5Gi'
  DIRECTOR_CORE_KUBERNETES_VOLUME_TYPE: 'hostpath'
  DIRECTOR_CORE_KUBERNETES_HOST_PATH_BASE: '/tmp/maze-test/kubernetes/agents'
  DIRECTOR_CORE_DOCKER_AGENT_BASE_IMAGE: 'maze-agent:latest'
  DIRECTOR_CORE_ALLOW_PRIVATE_NETWORKS: 'true'
  DIRECTOR_CORE_AUTH_DATABASE_HOST: 'postgresql.maze-test.svc.cluster.local'
  DIRECTOR_CORE_AUTH_DATABASE_PORT: '5432'
  DIRECTOR_CORE_AUTH_DATABASE_NAME: 'maze_auth'
  DIRECTOR_CORE_HOST_DATABASE_HOST: 'postgresql.maze-test.svc.cluster.local'
  DIRECTOR_CORE_HOST_DATABASE_PORT: '5432'
  DIRECTOR_CORE_HOST_DATABASE_NAME: 'maze_host'
  DIRECTOR_CORE_AUTHZ_ENABLED: 'true'
  DIRECTOR_CORE_AUTHZ_ADMIN_SUBJECT_KEY: 'user:admin'
  DIRECTOR_CORE_AUTHZ_ADMIN_DISPLAY_NAME: 'admin'
  DIRECTOR_CORE_WORKSPACE_BASE_DIR: '/data'
  DIRECTOR_CORE_WORKSPACE_MOUNT_DIR: '/data'
