apiVersion: v1
kind: ConfigMap
metadata:
  name: manager-config
  namespace: maze-prod
data:
  AGENT_MANAGER_RUNTIME_TYPE: 'kubernetes'
  AGENT_MANAGER_KUBERNETES_NAMESPACE: 'maze-prod'
  AGENT_MANAGER_KUBERNETES_AGENT_IMAGE_PREFIX: 'maze-agent'
  AGENT_MANAGER_KUBERNETES_AGENT_IMAGE_TAG: 'latest'
  AGENT_MANAGER_KUBERNETES_IMAGE_PULL_POLICY: 'Never'
  AGENT_MANAGER_KUBERNETES_MANAGER_ADDR: 'agent-manager.maze-prod.svc.cluster.local:8080'
  AGENT_MANAGER_KUBERNETES_PVC_SIZE: '10Gi'
  AGENT_MANAGER_KUBERNETES_VOLUME_TYPE: 'pvc'
  # K8s 模式下动态构建 Host 镜像时，FROM 依赖这张 Agent 基础镜像。
  AGENT_MANAGER_DOCKER_AGENT_BASE_IMAGE: 'maze-agent:latest'
  AGENT_MANAGER_ALLOW_PRIVATE_NETWORKS: 'true'
  AGENT_MANAGER_AUTH_DATABASE_HOST: 'postgresql.maze-prod.svc.cluster.local'
  AGENT_MANAGER_AUTH_DATABASE_PORT: '5432'
  AGENT_MANAGER_AUTH_DATABASE_NAME: 'maze_auth'
  AGENT_MANAGER_HOST_DATABASE_HOST: 'postgresql.maze-prod.svc.cluster.local'
  AGENT_MANAGER_HOST_DATABASE_PORT: '5432'
  AGENT_MANAGER_HOST_DATABASE_NAME: 'maze_host'
  AGENT_MANAGER_AUTHZ_ENABLED: 'true'
  AGENT_MANAGER_AUTHZ_ADMIN_SUBJECT_KEY: 'user:admin'
  AGENT_MANAGER_AUTHZ_ADMIN_DISPLAY_NAME: 'admin'
  AGENT_MANAGER_WORKSPACE_BASE_DIR: '/data'
  AGENT_MANAGER_WORKSPACE_MOUNT_DIR: '/data'
