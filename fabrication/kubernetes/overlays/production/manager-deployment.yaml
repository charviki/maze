apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-manager
  namespace: maze-prod
spec:
  selector:
    matchLabels:
      app: agent-manager
  template:
    metadata:
      labels:
        app: agent-manager
    spec:
      serviceAccountName: maze-manager
      initContainers:
        - name: wait-for-database
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: manager-config
            - secretRef:
                name: manager-secret
          command:
            - /bin/sh
            - -c
            - |
              until nc -z "$AGENT_MANAGER_DATABASE_HOST" "$AGENT_MANAGER_DATABASE_PORT"; do
                echo "waiting for database ${AGENT_MANAGER_DATABASE_HOST}:${AGENT_MANAGER_DATABASE_PORT}"
                sleep 1
              done
      containers:
        - name: agent-manager
          image: maze-manager:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: manager-config
            - secretRef:
                name: manager-secret
          env:
            - name: AGENT_MANAGER_SERVER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: manager-secret
                  key: AUTH_TOKEN
            - name: AGENT_MANAGER_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: manager-secret
                  key: DATABASE_USER
            - name: AGENT_MANAGER_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manager-secret
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
            - name: docker-socket
              mountPath: /var/run/docker.sock
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
            requests:
              cpu: '0.5'
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: manager-data
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
