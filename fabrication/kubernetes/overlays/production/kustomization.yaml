apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - postgres.yaml
  - director-core-configmap.yaml
  - director-core-deployment.yaml

patches:
  - target:
      kind: Secret
      name: director-core-secret
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: director-core-secret
      stringData:
        DIRECTOR_CORE_JWT_SECRET: 'prod-jwt-secret-must-change-before-deploy'
        DIRECTOR_CORE_JWT_DEFAULT_ADMIN_PASSWORD: 'admin'
        DIRECTOR_CORE_KUBERNETES_AGENT_JWT_SECRET: 'prod-jwt-secret-must-change-before-deploy'
        DATABASE_USER: 'maze'
        DATABASE_PASSWORD: 'maze'
        GIT_KEY_ENCRYPTION_KEY: '1626b7b1fc47e74ad0d80a0af1faeddc0fdb7a5788869dc3d8bb656bbf1d1140'
  - target:
      kind: Secret
      name: the-forge-secret
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: the-forge-secret
      stringData:
        THE_FORGE_SERVER_JWT_SECRET: 'prod-jwt-secret-must-change-before-deploy'
        DATABASE_USER: 'maze'
        DATABASE_PASSWORD: 'maze'
  - target:
      kind: Ingress
      name: web
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: web
      spec:
        rules:
          - host: maze.example.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web
                      port:
                        number: 80
