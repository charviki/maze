server {
    listen 80;
    server_name _;

    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # The Forge API routes → the-forge backend
    # 匹配 the-forge 的所有 gRPC-gateway 路由（Archive + Doc + Link）
    location ~ ^/api/v1/(archives|docs)(/|:|$) {
        proxy_pass http://${THE_FORGE_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support（对 oracle chat 长连接生效）
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # 文件上传支持
        client_max_body_size 32m;
    }

    # Director Core API routes
    location /api/ {
        proxy_pass http://${DIRECTOR_CORE_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 代理支持：终端连接需要 HTTP 升级为 WebSocket 协议
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # 根据是否有 Upgrade 头决定 Connection 值（WebSocket 升级 or 普通 HTTP 关闭）
        set $conn_value "close";
        if ($http_upgrade != "") {
            set $conn_value "upgrade";
        }
        proxy_set_header Connection $conn_value;

        # WebSocket 长连接超时（默认 60s 会断开终端）
        proxy_read_timeout ${WS_TIMEOUT};
        proxy_send_timeout ${WS_TIMEOUT};
    }

    location /health {
        proxy_pass http://${DIRECTOR_CORE_UPSTREAM};
        proxy_set_header Host $host;
    }

    # Director Console SPA
    location /director-console/ {
        alias /usr/share/nginx/html/director-console/;
        try_files $uri $uri/ /director-console/index.html;
    }

    # Arrival Gate 作为首页
    location /arrival-gate/ {
        alias /usr/share/nginx/html/arrival-gate/;
        try_files $uri $uri/ /arrival-gate/index.html;
    }

    location /the-forge/ {
        alias /usr/share/nginx/html/the-forge/;
        try_files $uri $uri/ /the-forge/index.html;
    }

    location = / {
        rewrite ^ /arrival-gate/ redirect;
    }
}
