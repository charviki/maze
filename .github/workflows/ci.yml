name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-check:
    name: Go Build + Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: fabrication/cradle/go.mod

      - name: Build
        run: make build-go

      - name: Install golangci-lint
        run: |
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.12.1

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  frontend-check:
    name: Frontend Check + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript SDK
        run: make gen-sdk

      - name: Frontend checks
        run: make check-frontend

      - name: Format check
        run: make format-js-check
