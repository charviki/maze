version: '2'
sql:
  - engine: 'postgresql'
    queries: 'queries/'
    schema: 'queries/schema.sql'
    gen:
      go:
        package: 'gen'
        sql_package: 'pgx/v5'
        out: 'sqlc/'
        emit_json_tags: true
        emit_prepared_queries: true
        emit_pointers_for_null_types: true
