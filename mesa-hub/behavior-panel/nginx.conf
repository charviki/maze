server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://${MANAGER_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 代理支持：终端连接需要 HTTP 升级为 WebSocket 协议
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # 根据是否有 Upgrade 头决定 Connection 值（WebSocket 升级 or 普通 HTTP 关闭）
        set $conn_value "close";
        if ($http_upgrade != "") {
            set $conn_value "upgrade";
        }
        proxy_set_header Connection $conn_value;

        # WebSocket 长连接超时（默认 60s 会断开终端）
        proxy_read_timeout ${WS_TIMEOUT};
        proxy_send_timeout ${WS_TIMEOUT};
    }

    location /health {
        proxy_pass http://${MANAGER_UPSTREAM};
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
